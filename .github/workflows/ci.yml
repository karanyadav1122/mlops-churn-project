name: CI

on:
  push:
    branches:
      - main
      - develop
      - "**"
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8 httpx

      - name: Lint code
        run: |
          flake8 api streaming ml spark tests --max-line-length=120

      - name: Run tests
        run: |
          pytest -q

      - name: Validate Docker build
        run: |
          docker build -t mlops-churn-project:test .